server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: talent-label
  datasource:
    url: jdbc:postgresql://localhost:5432/talent_label
    username: talent
    password: talent123
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.talent.label: debug

app:
  docs-dir: ${APP_DOCS_DIR:}

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: talent-label-db
    environment:
      POSTGRES_DB: talent_label
      POSTGRES_USER: talent
      POSTGRES_PASSWORD: talent123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talent -d talent_label"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: talent-label-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talent-label-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/talent_label?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: talent
      SPRING_DATASOURCE_PASSWORD: talent123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      APP_DOCS_DIR: /app/doc
    volumes:
      - ./doc:/app/doc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talent-label-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
